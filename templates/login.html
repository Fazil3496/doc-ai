<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doc.ai | Secure Medical Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }

        .medical-bg {
            background-image: radial-gradient(#26bba62b 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .icon-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="medical-bg flex items-center justify-center min-h-screen p-4 md:p-10">

    <div class="bg-white rounded-[60px] shadow-2xl shadow-teal-900/5 w-full max-w-6xl flex flex-col md:flex-row overflow-hidden border border-slate-100">

        <div class="flex-1 p-12 md:p-20 flex flex-col justify-between space-y-10">
            <div>
                <p class="text-slate-400 font-semibold tracking-widest uppercase text-xs mb-4">AI Medical Engine</p>
                <h1 class="text-6xl font-black text-[#26bba6] tracking-tight mb-6">Doc.ai<span class="text-teal-900">.</span></h1>
                <p class="text-slate-500 leading-relaxed max-w-sm text-lg">
                    Experience our unified medical hub. Securely analyze reports with the power of artificial intelligence.
                </p>
            </div>

            <div class="relative py-10 flex justify-center">
                <div class="absolute inset-0 bg-teal-50 rounded-full blur-3xl opacity-40 transform scale-75"></div>
                <div class="icon-float relative z-10 flex gap-4">
                    <i data-lucide="users" class="w-32 h-32 text-[#26bba6] opacity-80"></i>
                    <i data-lucide="activity" class="w-16 h-16 text-teal-900 absolute -top-4 -right-4 animate-pulse"></i>
                </div>
            </div>
        </div>

        <div class="w-full md:w-[460px] p-12 md:p-20 bg-white flex flex-col justify-center border-l border-slate-50">
            <div class="mb-10">
                <h2 class="text-3xl font-extrabold text-teal-950 mb-2">Secure Login</h2>
                <p class="text-slate-400 text-sm">Please login to your medical account.</p>
            </div>

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2 px-1">Medical ID / Email</label>
                    <input type="email" name="email" required
                        class="w-full bg-slate-50 rounded-2xl px-6 py-4 border border-slate-100 focus:border-[#26bba6] focus:ring-4 focus:ring-[#26bba6]/10 focus:outline-none transition-all placeholder:text-slate-300"
                        placeholder="medical-id@doc.ai">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2 px-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">Password</label>
                        <a href="#" class="text-[10px] text-slate-400 hover:text-[#26bba6] font-bold">Forgot Password?</a>
                    </div>
                    <input type="password" name="password" required
                        class="w-full bg-slate-50 rounded-2xl px-6 py-4 border border-slate-100 focus:border-[#26bba6] focus:ring-4 focus:ring-[#26bba6]/10 focus:outline-none transition-all placeholder:text-slate-300"
                        placeholder="••••••••">
                </div>

                <div class="flex items-center gap-3 pt-4">
                    <button type="submit"
                        class="flex-1 bg-[#26bba6] text-white font-extrabold py-4 rounded-2xl hover:bg-[#1f9b8a] hover:shadow-lg hover:shadow-teal-500/30 transition-all text-xs uppercase tracking-widest">
                        Login
                    </button>
                    <button type="button"
                        class="flex-1 bg-white text-[#26bba6] font-extrabold py-4 rounded-2xl border-2 border-slate-100 hover:border-[#26bba6] transition-all text-xs uppercase tracking-widest">
                        Sign Up
                    </button>
                </div>
            </form>

            <div class="mt-16 text-center">
                <a href="#" class="text-xs text-slate-400 hover:text-[#26bba6] font-semibold transition-colors">Contact Doc.ai Support</a>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full h-2 bg-[#26bba6]"></div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
