<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doc.ai | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --brand-teal: #26bba6;
            --dark-navy: #0d2137;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--dark-navy);
            margin: 0;
            overflow: hidden;
        }

        /* Animated Healthcare Background */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(38, 187, 166, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(38, 187, 166, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            display: flex;
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Left Side Design */
        .hero-section {
            flex: 1.2;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9f8 100%);
            border-radius: 50px 0 0 50px;
            position: relative;
        }

        .doctor-img {
            width: 110%;
            max-width: 600px;
            filter: drop-shadow(0 30px 60px rgba(38, 187, 166, 0.3));
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: absolute;
            bottom: 40px;
            left: 50px;
        }

        .doctor-img:hover {
            transform: translateY(-20px) scale(1.05);
        }

        /* Form Styling */
        .login-section {
            flex: 0.8;
            padding: 60px;
            display: flex;
            align-items: center;
            background: white;
            border-radius: 0 50px 50px 0;
        }

        .input-group input {
            background: #f4f7f9;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: white;
            box-shadow: 0 0 0 4px rgba(38, 187, 166, 0.1);
            border-color: var(--brand-teal);
        }

        .btn-primary {
            background: var(--brand-teal);
            box-shadow: 0 10px 30px rgba(38, 187, 166, 0.4);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-mesh"></div>

    <div class="main-card overflow-hidden">

        <div class="hero-section">
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-6">
                    <span class="h-[2px] w-12 bg-slate-300"></span>
                    <p class="text-slate-400 font-bold uppercase tracking-[0.4em] text-[10px]">Doc.ai Intelligence</p>
                </div>
                <h1 class="text-7xl font-black text-slate-800 tracking-tighter mb-4 leading-none">
                    Trends<br>
                    <span class="text-[#26bba6]">Healthcare.</span>
                </h1>
                <p class="text-slate-500 text-lg max-w-sm font-medium mt-6">
                    Unified medical analysis powered by advanced neural engines.
                </p>
            </div>

            <img src="{{ url_for('static', filename='images/doctors.jpg') }}"
                 class="doctor-img" alt="Medical Team">
        </div>

        <div class="login-section">
            <div class="w-full max-w-md mx-auto">
                <div class="mb-12">
                    <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight">Welcome</h2>
                    <p class="text-slate-400 mt-2">Sign in to your medical dashboard</p>
                </div>

                <form action="/login" method="POST" class="space-y-6">
                    <div class="input-group">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Identity Access</label>
                        <input type="email" name="email" required
                            class="w-full rounded-2xl px-6 py-5 border-2 border-transparent outline-none placeholder:text-slate-300"
                            placeholder="medical-id@doc.ai">
                    </div>

                    <div class="input-group">
                        <div class="flex justify-between mb-2 ml-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Credentials</label>
                            <a href="#" class="text-[10px] text-[#26bba6] font-bold">Forgot?</a>
                        </div>
                        <input type="password" name="password" required
                            class="w-full rounded-2xl px-6 py-5 border-2 border-transparent outline-none placeholder:text-slate-300"
                            placeholder="••••••••">
                    </div>

                    <div class="flex gap-4 pt-8">
                        <button type="submit"
                            class="btn-primary flex-[1.5] text-white font-black py-5 rounded-2xl hover:scale-105 active:scale-95 transition-all uppercase tracking-widest text-sm">
                            Login
                        </button>
                        <button type="button"
                            class="flex-1 bg-white text-slate-800 border-2 border-slate-100 font-bold py-5 rounded-2xl hover:border-[#26bba6] transition-all uppercase tracking-widest text-[10px]">
                            Sign Up
                        </button>
                    </div>
                </form>

                <div class="mt-16 pt-8 border-t border-slate-50 flex justify-between items-center text-[10px] font-black text-slate-300 tracking-widest">
                    <span>V 1.0.4</span>
                    <a href="#" class="hover:text-[#26bba6] transition-colors">SUPPORT CENTER</a>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full h-3 bg-[#26bba6]"></div>

</body>
</html>
