<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doc.ai | Secure Medical Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d2137; }

        .medical-bg {
            background-image: radial-gradient(#ffffff1a 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }

        .main-container {
            background-color: #ffffff;
            border-radius: 60px;
            overflow: hidden;
            box-shadow: 0 35px 70px -15px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="medical-bg flex items-center justify-center min-h-screen p-8">

    <div class="main-container w-full max-w-6xl flex flex-col md:flex-row relative">

        <div class="flex-1 p-16 md:p-24 flex flex-col justify-between">
            <div>
                <p class="text-slate-300 font-light text-6xl mb-2 tracking-tight">Trends</p>
                <h1 class="text-7xl font-black text-[#26bba6] tracking-tight mb-8">Doc.ai<span class="text-teal-900">.</span></h1>
                <p class="text-slate-400 leading-relaxed max-w-sm text-lg">
                    Experience our unified medical hub. Securely analyze medical reports with Doc.ai technology.
                </p>
            </div>

            <div class="mt-12">
                <img src="{{ url_for('static', filename='images/doctors.jpg') }}"
                     alt="Medical Team"
                     class="w-full max-w-md drop-shadow-2xl rounded-3xl">
            </div>
        </div>

        <div class="w-full md:w-[500px] p-12 flex items-center justify-center bg-slate-50/50">
            <div class="w-full bg-white rounded-[50px] p-12 shadow-2xl border border-slate-100">
                <div class="text-center mb-12">
                    <h2 class="text-4xl font-extrabold text-slate-800 mb-2 text-center w-full">Healthcare</h2>
                    <p class="text-slate-400 text-sm">Welcome back! Please login to your account.</p>
                </div>

                <form action="/login" method="POST" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] px-1">Medical ID / Email</label>
                        <input type="email" name="email" required
                            class="w-full bg-slate-100 rounded-2xl px-6 py-5 border-none focus:ring-2 focus:ring-[#26bba6]/20 focus:outline-none transition-all placeholder:text-slate-300"
                            placeholder="medical-id@doc.ai">
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em]">Password</label>
                            <a href="#" class="text-[11px] text-[#26bba6] font-bold">Forgot Password?</a>
                        </div>
                        <input type="password" name="password" required
                            class="w-full bg-slate-100 rounded-2xl px-6 py-5 border-none focus:ring-2 focus:ring-[#26bba6]/20 focus:outline-none transition-all placeholder:text-slate-300"
                            placeholder="••••••••">
                    </div>

                    <div class="flex items-center gap-4 pt-6">
                        <button type="submit"
                            class="flex-1 bg-[#26bba6] text-white font-bold py-5 rounded-2xl hover:bg-[#1f9b8a] transition-all shadow-lg shadow-teal-500/20 uppercase tracking-widest">
                            Login
                        </button>
                        <button type="button"
                            class="flex-1 bg-white text-[#26bba6] font-bold py-5 rounded-2xl border border-slate-200 hover:border-[#26bba6] transition-all uppercase tracking-widest">
                            Sign Up
                        </button>
                    </div>
                </form>

                <div class="mt-12 text-center">
                    <a href="#" class="text-xs text-slate-400 hover:text-[#26bba6] uppercase font-black tracking-widest transition-colors">Contact us</a>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full h-4 bg-[#26bba6]"></div>
    </div>
</body>
</html>
