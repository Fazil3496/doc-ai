<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doc.ai | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Smooth glow transition for the lamp */
        #lamp-icon {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.1));
        }
        .lamp-on {
            color: #2dd4bf !important; /* Teal 400 */
            filter: drop-shadow(0 0 20px rgba(45, 212, 191, 0.8)) !important;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen font-sans overflow-hidden">

    <div class="flex flex-col md:flex-row items-center gap-16">

        <div class="text-center flex flex-col items-center">
            <div onclick="toggleLamp()" class="cursor-pointer group relative">
                <div class="w-1 h-20 bg-slate-700 mx-auto mb-[-5px] group-hover:bg-teal-600 transition-colors"></div>

                <i data-lucide="lamp-ceiling" id="lamp-icon" class="w-32 h-32 text-slate-600 hover:text-slate-400"></i>

                <p class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">TOUCH TO TOGGLE</p>
            </div>

            <p id="system-status" class="text-slate-600 font-bold mt-12 tracking-[0.3em] transition-colors duration-500">SYSTEM OFFLINE</p>
        </div>

        <div class="bg-slate-900 p-10 rounded-[40px] border border-slate-800 shadow-2xl w-96 relative z-10">
            <div class="mb-8">
                <h2 class="text-3xl font-black tracking-tight mb-2">Welcome Back</h2>
                <p class="text-slate-500 text-sm">Please sign in to access Doc.ai</p>
            </div>

            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <input type="email" name="email" required
                        class="w-full bg-slate-950 rounded-2xl px-6 py-5 border border-slate-800 focus:border-teal-500 focus:outline-none transition-all placeholder:text-slate-700"
                        placeholder="medical-id@doc.ai">
                </div>
                <div>
                    <input type="password" name="password" required
                        class="w-full bg-slate-950 rounded-2xl px-6 py-5 border border-slate-800 focus:border-teal-500 focus:outline-none transition-all placeholder:text-slate-700"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full bg-white text-slate-950 font-black py-5 rounded-2xl hover:bg-teal-400 hover:scale-[1.02] active:scale-95 transition-all shadow-lg mt-4 uppercase tracking-widest">
                    Enter Dashboard
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="#" class="text-xs text-slate-600 hover:text-teal-500 font-bold transition-colors">FORGOT CREDENTIALS?</a>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        let isLightOn = false;
        const lamp = document.getElementById('lamp-icon');
        const statusText = document.getElementById('system-status');

        function toggleLamp() {
            isLightOn = !isLightOn;

            if (isLightOn) {
                // ON State
                lamp.classList.add('lamp-on');
                statusText.innerText = "SYSTEM ACTIVE";
                statusText.classList.remove('text-slate-600');
                statusText.classList.add('text-teal-500', 'animate-pulse');
            } else {
                // OFF State
                lamp.classList.remove('lamp-on');
                statusText.innerText = "SYSTEM OFFLINE";
                statusText.classList.remove('text-teal-500', 'animate-pulse');
                statusText.classList.add('text-slate-600');
            }
        }
    </script>
</body>
</html>
