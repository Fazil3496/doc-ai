<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doc.ai | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen">
    <div class="flex flex-col md:flex-row items-center gap-16">
        <div class="text-center">
            <img src="{{ url_for('static', filename='images/login_bear.png') }}" class="w-64">
            <p class="text-teal-500 font-bold mt-4 animate-pulse">SYSTEM ACTIVE</p>
        </div>
        <div class="bg-slate-900 p-10 rounded-[32px] border border-slate-800 shadow-2xl w-96">
            <h2 class="text-3xl font-bold mb-8">Welcome Back</h2>
            <form action="/login" method="POST" class="space-y-6">
                <input type="email" required class="w-full bg-slate-950 rounded-xl px-5 py-4 border-none" placeholder="Email">
                <input type="password" required class="w-full bg-slate-950 rounded-xl px-5 py-4 border-none" placeholder="Password">
                <button type="submit" class="w-full bg-teal-500 text-slate-950 font-black py-4 rounded-xl hover:scale-105 transition-all">SIGN IN</button>
            </form>
        </div>
    </div>
</body>
</html>
